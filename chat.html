<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Moderno</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- NOTIFICATIONS -->
  <div id="notificationsContainer"></div>

  <!-- CONTEXT MENU (Private Chat) -->
  <div id="userContextMenu" class="context-menu">
    <div class="context-menu-item" onclick="startPrivateChatFromMenu()">
      💬 Mensaje Privado
    </div>
    <!-- <div class="context-menu-item danger" onclick="blockUserFromMenu()">
      🚫 Bloquear (Local)
    </div> -->
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginContainer">
    <div id="loginBox">
      <h2>🔐 Iniciar Sesión</h2>
      <p>Bienvenido al Chat Premium</p>

      <form onsubmit="event.preventDefault(); handleLogin();" style="width:100%;">
          <div class="inputGroup">
            <label for="loginUsername">Usuario (@ejemplo)</label>
            <input type="text" id="loginUsername" placeholder="@usuario" autocomplete="username" oninput="validateUsernameLength()">
          </div>

          <div class="inputGroup">
            <label for="loginPassword">Contraseña</label>
            <div style="position: relative;">
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" style="width: 100%; box-sizing: border-box; padding-right: 40px;">
                <span onclick="togglePasswordVisibility()" style="
                    position: absolute;
                    right: 12px;
                    top: 50%;
                    transform: translateY(-50%);
                    cursor: pointer;
                    color: var(--text-secondary);
                    font-size: 1.1rem;
                    user-select: none;
                ">👁</span>
            </div>
            <div id="passwordRequirements" class="passwordRequirements" style="display:none;">
               <small>Requiere: Mayúscula, Número, 6+ caracteres</small>
            </div>
          </div>

          <div class="inputGroup" id="displayNameGroup" style="display: none;">
            <label for="loginDisplayName">Nombre Visible</label>
            <input type="text" id="loginDisplayName" placeholder="Tu Nombre" autocomplete="name">
          </div>

          <div class="checkboxGroup" style="margin-bottom: 2rem;">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe" style="font-size: 0.9rem; color: var(--text-secondary);">Recordar sesión</label>
          </div>

          <button type="submit" class="loginButton">Entrar al Chat</button>
      </form>
    </div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="container" style="display: none;">
    
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div style="padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;">
        <h2 style="color: white; margin: 0; font-size: 1.2rem;">PROYECTO JA</h2>
        <small style="color: var(--accent-color);">Chat v2.0</small>
      </div>

      <div id="myProfile" style="display: flex; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;">
         <div id="userAvatarTop" class="avatar">?</div>
         <div id="usernameDisplay">
            <span>Usuario</span>
            <small>@id</small>
         </div>
         <button onclick="logout()" style="margin-left: auto; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--danger-color);" title="Salir">⏻</button>
      </div>

      <button onclick="openUserSearch()" style="width:100%; padding:10px; margin-bottom:20px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s;">
        <span>🔍</span> Buscar Usuario
      </button>

      <h3 id="usersTitle">CONECTADOS</h3>
      <!-- Botón para volver al chat general (oculto por defecto) -->
      <button id="backToGeneralBtn" onclick="returnToGlobalChat()" style="display:none; width:100%; padding:8px; margin-bottom:10px; background:var(--primary-gradient); border:none; border-radius:8px; color:white; cursor:pointer;">⬅ Volver al General</button>
      
      <div id="usersList" style="flex: 1; overflow-y: auto;">
         <!-- Users injected via JS -->
      </div>
    </div>

    <!-- TOGGLE BUTTON -->
    <div id="sidebarToggle" class="sidebar-toggle">
      <span class="toggle-icon">◀</span>
    </div>

    <!-- CHAT AREA -->
    <div id="chatArea">
      <!-- TOP BAR -->
      <div id="topBar">
        <div style="display: flex; align-items: center; gap: 10px;">
          <h3 style="margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
             <span id="roomName">Sala Pública</span>
             <span class="room-badge" id="roomBadge">En vivo</span>
          </h3>
        </div>
        <div style="display: flex; gap: 10px;">
           <button class="action-btn" onclick="changeName()" title="Cambiar Nombre">✏️</button>
        </div>
      </div>

      <!-- MESSAGES LIST -->
      <div id="chat"></div>
      
      <!-- TYPING INDICATOR -->
      <div id="typing" style="padding: 0 2rem; height: 20px; font-size: 0.8rem; color: var(--accent-color); font-style: italic;"></div>

      <!-- REPLY PREVIEW -->
      <div id="replyArea">
        <div class="reply-header">
           <span class="reply-title">↩️ Responder a <span id="replyAuthor"></span></span>
           <button class="reply-close" onclick="cancelReply()">×</button>
        </div>
        <div class="reply-content-text" id="replyText"></div>
      </div>

      <!-- INPUT AREA -->
      <div id="inputArea">
        <button class="action-btn" onclick="toggleEmojiPicker()" style="font-size: 1.5rem;">😊</button>
        
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="Escribe tu mensaje..." rows="1"></textarea>
        </div>
        
        <button id="sendButton" onclick="sendMessage()">➤</button>
      </div>

      <!-- EMOJI PICKER -->
      <div id="emojiPicker" class="emoji-picker">
        <div class="emoji-header">
          <span style="font-weight: 700; color: white;">Emojis</span>
          <button class="action-btn" onclick="toggleEmojiPicker()">×</button>
        </div>
        
        <div class="emoji-body">
          <div class="emoji-category-title">Caritas</div>
          <div class="emoji-grid" id="emojiFaces"></div>
          
          <div class="emoji-category-title">Manos</div>
          <div class="emoji-grid" id="emojiHands"></div>
          
          <div class="emoji-category-title">Objetos</div>
          <div class="emoji-grid" id="emojiObjects"></div>

          <div class="emoji-category-title">Símbolos</div>
          <div class="emoji-grid" id="emojiSymbols"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- CUSTOM MODAL -->
  <div id="customModal" class="modal-overlay">
    <div class="modal-content">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalBody" class="modal-body"></div>
      <input type="text" id="modalInput" class="modal-input" style="display: none;" placeholder="" autocomplete="off">
      <div class="modal-actions">
        <button id="modalCancelBtn" class="modal-btn secondary">Cancelar</button>
        <button id="modalConfirmBtn" class="modal-btn primary">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- USER SEARCH MODAL -->
  <div id="userSearchModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px; text-align: left;">
      <div class="modal-title">Buscar Usuario</div>
      <input type="text" id="userSearchInput" class="modal-input" placeholder="Escribe el @usuario..." autocomplete="off">
      <div id="userSearchResults" style="max-height: 300px; overflow-y: auto; margin-top: 10px;">
         <div style="text-align:center; color:gray; padding:20px;">Escribe para buscar...</div>
      </div>
      <div class="modal-actions" style="justify-content: flex-end; margin-top: 15px;">
        <button onclick="closeUserSearch()" class="modal-btn secondary">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat.js"></script>
</body>
</html>
